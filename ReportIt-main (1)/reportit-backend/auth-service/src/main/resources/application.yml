server:
  port: 8081

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql}
  mail:
    host: ${REPORTIT_MAIL_HOST:smtp.gmail.com}
    port: ${REPORTIT_MAIL_PORT:587}
    username: ${REPORTIT_MAIL_USERNAME:}
    password: ${REPORTIT_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

reportit:
  mail:
    from: ${REPORTIT_MAIL_FROM:reportit.noreply@gmail.com}

jwt:
  secret: ReportItSecretKeyForJWT2026MustBeAtLeast256BitsLong!!
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

cors:
  allowed-origins: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: mysql

  datasource:
    url: jdbc:mysql://localhost:3306/reportit_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:Jothisreerc@14}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
