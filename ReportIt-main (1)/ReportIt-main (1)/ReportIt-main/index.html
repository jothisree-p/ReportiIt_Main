<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>reportit</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        window.__reportItPopupQueue = window.__reportItPopupQueue || [];
        window.alert = function (message) {
          if (window.__reportItShowPopup) {
            window.__reportItShowPopup(message);
            return;
          }
          window.__reportItPopupQueue.push(message);
        };
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
